<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Tree Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..144,400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fafaF8;
            --card-bg: #ffffff;
            --primary: #1a1a1a;
            --accent: #d97706; /* Subtle brown/tan accent */
            --text-main: #1a1a1a;
            --text-dim: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 0.75rem;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-family: 'Source Serif 4', serif;
            font-style: italic;
            color: var(--text-dim);
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        textarea, pre {
            width: 100%;
            height: 450px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.05);
        }

        pre {
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #f9fafb;
            border-color: #f1f5f9;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 2.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Source Serif 4', serif;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .config {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-dim);
            font-size: 0.875rem;
            font-weight: 500;
        }

        input[type="number"] {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.6rem;
            border-radius: 0.5rem;
            width: 3.5rem;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: #f9fafb;
            border-color: var(--text-dim);
            color: var(--text-main);
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.875rem;
            font-family: 'Source Serif 4', serif;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Text2Tree</h1>
            <p class="subtitle">Beautiful Unicode diagrams from indented text.</p>
        </header>

        <main class="editor-grid">
            <div class="card">
                <div class="button-group">
                    <label>Input</label>
                    <div class="config">
                        Indent: <input type="number" id="indentSize" value="2" min="1" max="8">
                    </div>
                </div>
                <textarea id="inputText" spellcheck="false" placeholder="A&#10;  B&#10;  C&#10;    D&#10;  E">A
  B
  C
    D
  E</textarea>
                <button id="convertBtn">Convert to Tree</button>
            </div>

            <div class="card">
                <div class="button-group">
                    <label>Output</label>
                    <button class="copy-btn" id="copyBtn">Copy Tree</button>
                </div>
                <pre id="outputText"></pre>
            </div>
        </main>
        
        <footer class="footer">
            Designed for clarity and precision.
        </footer>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');
        const indentSize = document.getElementById('indentSize');

        async function convert() {
            const text = inputText.value;
            const spaces = indentSize.value;
            
            if (!text.trim()) {
                outputText.textContent = "";
                return;
            }

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, spaces: parseInt(spaces) })
                });
                const data = await response.json();
                
                // If the output is identical to input and has no tree characters, 
                // it might mean no indentation was found.
                if (data.tree === text.trim() && !data.tree.includes('├──') && !data.tree.includes('└──')) {
                    outputText.innerHTML = `<span style="color: #fb923c; font-style: italic;">No indentation detected. Use spaces or tabs to create hierarchy.</span>\n\n${data.tree}`;
                } else {
                    outputText.textContent = data.tree;
                }
            } catch (err) {
                outputText.textContent = "Error converting text: " + err.message;
            }
        }

        // Real-time conversion
        inputText.addEventListener('input', convert);
        indentSize.addEventListener('input', convert);
        convertBtn.addEventListener('click', convert);

        // Handle Tab key for indentation
        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = inputText.selectionStart;
                const end = inputText.selectionEnd;
                const spaces = " ".repeat(parseInt(indentSize.value) || 2);
                
                // Set textarea value to: text before caret + spaces + text after caret
                inputText.value = inputText.value.substring(0, start) + 
                                  spaces + 
                                  inputText.value.substring(end);

                // Put caret at right position again
                inputText.selectionStart = inputText.selectionEnd = start + spaces.length;
                
                // Trigger conversion
                convert();
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputText.textContent);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy Output'; }, 2000);
        });

        // Initialize with default
        convert();
    </script>
</body>
</html>
